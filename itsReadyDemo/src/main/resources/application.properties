spring.application.name=itsReadyDemo
server.port=8082

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.loadbalancer.client.enabled=true

# Retry configuration for Feign
resilience4j.retry.instances.ready.maxAttempts=3
resilience4j.retry.instances.ready.waitDuration=1000

spring.kafka.bootstrap-servers=localhost:9092


spring.kafka.consumer.group-id=itsReadyDemo

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer