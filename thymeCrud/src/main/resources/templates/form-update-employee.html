<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Update employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container border-bottom border-gray p-2">
    <h3>Update Employee</h3>
</div>
<div class="container">
    <h5>Adding Data for new employee</h5>
    <form class="d-grid flex-row justify-content-start gap-1 fw-bold" th:action="@{/temp/saveEmployee}" th:object="${employee}" method="POST">
        <input type="hidden" th:field="*{id}">
        <label for="firstName">First Name</label>
        <input class="form-control" type="text" id="firstName" th:field="*{firstName}" required>
        <label for="lastName">Last Name</label>
        <input class="form-control" type="text" id="lastName" th:field="*{lastName}" required>
        <label for="email">Email</label>
        <input class="form-control" type="text" id="email" th:field="*{email}">
        <label for="age">Age</label>
        <input class="form-control" type="text" id="age" th:field="*{age}">
        <button type="submit" class="btn btn-primary pt-1">Submit</button>
    </form>
</div>
</body>
</html>
