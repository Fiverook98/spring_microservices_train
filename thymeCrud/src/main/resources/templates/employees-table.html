<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employees Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container p-2">
    <h1 class="pb-2">Employees Table</h1>
    <a class="btn btn-primary " th:href="@{/temp/formNewEmployee}">Add Employee</a>
</div>

<div class="container">
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
         <tr>
             <th scope="col">ID</th>
             <th scope="col">First Name</th>
             <th scope="col">Last Name</th>
             <th scope="col">Email</th>
             <th scope="col">Age</th>
             <th scope="col">Action</th>
         </tr>
        </thead>
        <tbody>
            <tr th:each="employee : ${employees}">
                <td th:text="${employee.id}"></td>
                <td th:text="${employee.firstName}"></td>
                <td th:text="${employee.lastName}"></td>
                <td th:text="${employee.email} ?: 'N/A'"></td>
                <td th:text="${employee.age} ?: 'N/A'"></td>
                <td>
                    <a class="btn btn-info btn-sm" th:href="@{/temp/formUpdateEmployee (employeeId=${employee.id})}">Update</a>
                    <a class="btn btn-danger btn-sm" th:href="@{/temp/deleteEmployee (employeeId=${employee.id})}"
                       onclick="if(!(confirm('Are you sure you want to delete this employee?'))) return false;">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
